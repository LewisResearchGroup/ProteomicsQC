version: "3.3"
   
services:
  web:
    container_name: proteomicsqc_web
    restart: always
    user: ${UID}
    platform: linux/amd64
    image: ghcr.io/lewisresearchgroup/proteomicsqc:${IMAGE_TAG:-latest}
    env_file:
      - ./.env
    command: /opt/conda/bin/python server.py
    volumes:
      - ./app/:/app/
      - ${DATALAKE}:/datalake/
      - ${MEDIA}:/appmedia/
      - ${STATIC}:/static/
      - ${COMPUTE}:/compute/
    ports:
      - "8080:8080"
    depends_on:
      - db
      - redis
    links:
      - redis:redis
  
  db:
    container_name: proteomicsqc_db
    restart: always
    # update to postgres v14
    image: postgres:14
    volumes:
      - ${DB}:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=postgres
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres

  redis:
    container_name: proteomicsqc_redis
    restart: always
    image: redis:alpine
    ports:
      - "6379:6379"

  celery:
    container_name: proteomicsqc_celery
    restart: always
    user: ${UID}
    platform: linux/amd64
    image: ghcr.io/lewisresearchgroup/proteomicsqc:${IMAGE_TAG:-latest}
    command: /opt/conda/bin/celery -A main worker -l info --concurrency ${CONCURRENCY}
    env_file:
      - ./.env
    volumes:
      - ./app/:/app/
      - ${DATALAKE}:/datalake/
      - ${COMPUTE}:/compute/
    environment:
      - DB_HOST=db
      - DB_NAME=app
      - DB_USER=postgres
      - DB_PASS=postgres
    depends_on:
      - db
      - redis
      - web

